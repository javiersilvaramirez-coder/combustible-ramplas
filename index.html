<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Combustible Ramplas — INCOM</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263045;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --accent-bg: rgba(59,130,246,0.12);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100dvh;
    padding-bottom: 2rem;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-inner {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg { width: 18px; height: 18px; fill: white; }

  .header-text h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  .header-text p  { font-size: 12px; color: var(--muted); }

  .container { max-width: 480px; margin: 0 auto; padding: 16px; }

  /* PASOS */
  .step-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .step-label .num {
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: white;
    flex-shrink: 0;
  }

  .section { margin-bottom: 20px; }

  /* FLOTA */
  .fleet-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .fleet-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    -webkit-appearance: none;
    width: 100%;
  }

  .fleet-btn:active { transform: scale(0.97); }

  .fleet-btn.selected {
    border-color: var(--accent);
    background: var(--accent-bg);
  }

  .fleet-btn .fb-marca {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }

  .fleet-btn .fb-patente {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.03em;
  }

  .fleet-btn .fb-info {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* DESTINOS */
  .dest-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }

  .dest-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .dest-chip:active { transform: scale(0.96); }

  .dest-chip.active {
    border-color: var(--accent);
    background: var(--accent-bg);
    color: var(--text);
    font-weight: 500;
  }

  .dest-chip .chip-km {
    font-size: 11px;
    opacity: 0.65;
  }

  .dest-chip .chip-del {
    font-size: 14px;
    opacity: 0.5;
    margin-left: 2px;
    line-height: 1;
  }

  .add-dest-form {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .add-dest-form input {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 13px;
    color: var(--text);
    -webkit-appearance: none;
    outline: none;
  }

  .add-dest-form input:focus { border-color: var(--accent); }
  .add-dest-form input[name=dname] { flex: 2; min-width: 140px; }
  .add-dest-form input[name=dkm]   { flex: 1; min-width: 80px; }

  .btn-add {
    background: var(--accent-bg);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    padding: 9px 14px;
    cursor: pointer;
    -webkit-appearance: none;
    white-space: nowrap;
  }

  .btn-add:active { transform: scale(0.96); }

  /* PANEL COMBUSTIBLE */
  #panelCombustible { display: none; }

  .fuel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }

  .fuel-slider-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .fuel-slider-label span:first-child { font-size: 14px; color: var(--muted); }

  .fuel-pct-big {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }

  input[type=range] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    background: var(--surface2);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    margin-bottom: 14px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent);
    cursor: pointer;
  }

  .metrics-row {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .metric {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px;
    text-align: center;
  }

  .metric .m-val { font-size: 18px; font-weight: 700; color: var(--text); }
  .metric .m-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.3; }

  .margin-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .margin-row label { font-size: 13px; color: var(--muted); }

  select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    padding: 7px 10px;
    -webkit-appearance: none;
    outline: none;
    cursor: pointer;
  }

  /* RESULTADO */
  .result {
    border-radius: var(--radius);
    padding: 16px;
    border-left: 4px solid transparent;
  }

  .result.green  { background: var(--green-bg);  border-color: var(--green); }
  .result.amber  { background: var(--amber-bg);  border-color: var(--amber); }
  .result.red    { background: var(--red-bg);    border-color: var(--red); }

  .result-litros {
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .result-litros span {
    font-size: 16px;
    font-weight: 400;
    color: var(--muted);
  }

  .result-msg { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

  .result-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 14px;
  }

  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-red   { background: rgba(239,68,68,0.15);  color: var(--red); }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .rg-item .rg-lbl { font-size: 11px; color: var(--muted); }
  .rg-item .rg-val { font-size: 15px; font-weight: 600; color: var(--text); }

  /* TANQUES */
  .tank-detail {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }

  .tank-detail strong { color: var(--text); }

  /* FOOTER */
  footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 24px 16px 8px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 17h2v2H3v-2zm16 0h2v2h-2v-2zM1 10l2-6h18l2 6v7H1v-7zm2 2v3h18v-3H3zm1-2h16l-1.5-4H5.5L4 10zM8 14a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm8 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Control de Combustible</h1>
      <p>Ramplas — INCOM</p>
    </div>
  </div>
</header>

<div class="container">

  <!-- PASO 1: EQUIPO -->
  <div class="section">
    <div class="step-label"><span class="num">1</span> Seleccionar equipo</div>
    <div class="fleet-grid" id="fleetGrid"></div>
  </div>

  <!-- PASO 2: DESTINO -->
  <div class="section">
    <div class="step-label"><span class="num">2</span> Destino del viaje</div>
    <div class="dest-chips" id="destChips"></div>
    <div class="add-dest-form">
      <input type="text"   name="dname" id="dname" placeholder="Ej: Puerto Mejillones" />
      <input type="number" name="dkm"   id="dkm"   placeholder="Km total" min="1" />
      <button class="btn-add" onclick="addDest()">+ Agregar</button>
    </div>
  </div>

  <!-- PASO 3: COMBUSTIBLE -->
  <div id="panelCombustible">
    <div class="step-label"><span class="num">3</span> Combustible actual</div>

    <div class="fuel-card">
      <div class="fuel-slider-label">
        <span>Nivel en estanque</span>
        <span class="fuel-pct-big" id="pctBig">50%</span>
      </div>
      <input type="range" id="fuelRange" min="0" max="100" value="50" step="1"
             oninput="onSlider(this.value)" />
      <div class="metrics-row">
        <div class="metric">
          <div class="m-val" id="mActual">—</div>
          <div class="m-lbl">Litros actuales</div>
        </div>
        <div class="metric">
          <div class="m-val" id="mNeeded">—</div>
          <div class="m-lbl">Litros requeridos</div>
        </div>
        <div class="metric">
          <div class="m-val" id="mAuto">—</div>
          <div class="m-lbl">Km disponibles</div>
        </div>
      </div>
      <div class="margin-row">
        <label>Margen de seguridad:</label>
        <select id="marginSel" onchange="calcResult()">
          <option value="5">5% — mínimo</option>
          <option value="10" selected>10% — recomendado</option>
          <option value="15">15% — precaución</option>
        </select>
      </div>
      <div id="tankDetail" class="tank-detail" style="display:none;"></div>
    </div>

    <div id="resultBox"></div>
  </div>

</div>

<footer>INCOM — Industria y Comercio Ltda.</footer>

<script>
/* ===================== DATOS ===================== */
const FLEET = [
  {marca:'DAF',           patente:'RTRJ-40', cap:580, est1:580, est2:0,   rend:2.9},
  {marca:'DAF',           patente:'RVFF-14', cap:580, est1:580, est2:0,   rend:2.9},
  {marca:'DAF',           patente:'RVFF-13', cap:580, est1:580, est2:0,   rend:2.9},
  {marca:'DAF',           patente:'LRVV-86', cap:580, est1:580, est2:0,   rend:2.9},
  {marca:'DAF',           patente:'LRVV-85', cap:580, est1:580, est2:0,   rend:2.9},
  {marca:'FREIGHTLINER',  patente:'RJBV-34', cap:700, est1:0,   est2:0,   rend:3.0},
  {marca:'FREIGHTLINER',  patente:'RJBV-35', cap:700, est1:0,   est2:0,   rend:3.0},
  {marca:'MERCEDES-BENZ', patente:'SYPL-10', cap:660, est1:290, est2:370, rend:3.0},
  {marca:'MERCEDES-BENZ', patente:'RKGC-82', cap:660, est1:290, est2:370, rend:3.0},
  {marca:'MERCEDES-BENZ', patente:'SSHY-46', cap:660, est1:290, est2:370, rend:3.0},
  {marca:'MERCEDES-BENZ', patente:'SPSH-74', cap:660, est1:290, est2:370, rend:3.0},
  {marca:'MERCEDES-BENZ', patente:'SHLL-37', cap:660, est1:290, est2:370, rend:3.0},
];

let DESTS = [
  {name:'Puerto Angamos',    km:1280},
  {name:'Puerto Totoralillo',km:960},
  {name:'Puerto Padrones',   km:1050},
];

let selV = null;
let selD = null;

/* ===================== RENDER FLOTA ===================== */
function renderFleet() {
  const g = document.getElementById('fleetGrid');
  g.innerHTML = '';
  FLEET.forEach((v, i) => {
    const b = document.createElement('button');
    b.className = 'fleet-btn' + (selV === i ? ' selected' : '');
    b.innerHTML =
      '<div class="fb-marca">' + v.marca + '</div>' +
      '<div class="fb-patente">' + v.patente + '</div>' +
      '<div class="fb-info">' + v.cap + ' L &nbsp;·&nbsp; ' + v.rend + ' km/L</div>';
    b.onclick = () => { selV = i; renderFleet(); checkPanel(); };
    g.appendChild(b);
  });
}

/* ===================== RENDER DESTINOS ===================== */
function renderDests() {
  const c = document.getElementById('destChips');
  c.innerHTML = '';
  DESTS.forEach((d, i) => {
    const chip = document.createElement('button');
    chip.className = 'dest-chip' + (selD === i ? ' active' : '');
    chip.innerHTML =
      d.name +
      ' <span class="chip-km">' + d.km + ' km</span>' +
      (DESTS.length > 1 ? ' <span class="chip-del" data-i="' + i + '">✕</span>' : '');
    chip.onclick = (e) => {
      const del = e.target.closest('[data-i]');
      if (del) {
        const idx = parseInt(del.dataset.i);
        DESTS.splice(idx, 1);
        if (selD >= DESTS.length) selD = null;
        renderDests(); checkPanel();
        return;
      }
      selD = i; renderDests(); checkPanel();
    };
    c.appendChild(chip);
  });
}

/* ===================== AGREGAR DESTINO ===================== */
function addDest() {
  const n = document.getElementById('dname').value.trim();
  const km = parseInt(document.getElementById('dkm').value);
  if (!n || !km || km < 1) return;
  DESTS.push({name: n, km});
  document.getElementById('dname').value = '';
  document.getElementById('dkm').value = '';
  renderDests();
}

/* ===================== MOSTRAR/OCULTAR PANEL ===================== */
function checkPanel() {
  const show = selV !== null && selD !== null;
  document.getElementById('panelCombustible').style.display = show ? 'block' : 'none';
  if (show) calcResult();
}

/* ===================== SLIDER ===================== */
function onSlider(v) {
  document.getElementById('pctBig').textContent = v + '%';
  calcResult();
}

/* ===================== CÁLCULO ===================== */
function calcResult() {
  if (selV === null || selD === null) return;

  const v   = FLEET[selV];
  const d   = DESTS[selD];
  const pct = parseInt(document.getElementById('fuelRange').value);
  const mgn = parseInt(document.getElementById('marginSel').value) / 100;

  const litActual    = Math.round((pct / 100) * v.cap);
  const litViaje     = Math.round(d.km / v.rend);
  const litRequerido = Math.round(litViaje * (1 + mgn));
  const litCargar    = Math.max(0, litRequerido - litActual);
  const kmDisp       = Math.round(litActual * v.rend);

  document.getElementById('mActual').textContent = litActual + ' L';
  document.getElementById('mNeeded').textContent = litRequerido + ' L';
  document.getElementById('mAuto').textContent   = kmDisp + ' km';

  /* detalle tanques si aplica */
  const td = document.getElementById('tankDetail');
  if (v.est1 > 0 && v.est2 > 0) {
    td.style.display = 'block';
    td.innerHTML = 'Estanque 1: <strong>' + v.est1 + ' L</strong> &nbsp;·&nbsp; Estanque 2: <strong>' + v.est2 + ' L</strong> &nbsp;·&nbsp; Total: <strong>' + v.cap + ' L</strong>';
  } else if (v.est1 > 0) {
    td.style.display = 'block';
    td.innerHTML = 'Estanque único: <strong>' + v.cap + ' L</strong>';
  } else {
    td.style.display = 'block';
    td.innerHTML = 'Capacidad total: <strong>' + v.cap + ' L</strong> (distribución no especificada)';
  }

  /* resultado */
  const rb = document.getElementById('resultBox');
  let cls, badgeCls, badgeTxt, titulo, msg;

  if (litCargar === 0) {
    cls = 'green'; badgeCls = 'badge-green'; badgeTxt = '✓ Listo para salir';
    titulo = 'No requiere carga';
    msg = 'El equipo tiene combustible suficiente para el viaje completo con margen de seguridad.';
  } else if (pct < 20) {
    cls = 'red'; badgeCls = 'badge-red'; badgeTxt = '⚠ Nivel crítico — verificar antes de salir';
    titulo = litCargar + ' L a cargar';
    msg = 'Nivel bajo. Se recomienda cargar antes de salir.';
  } else {
    cls = 'amber'; badgeCls = 'badge-amber'; badgeTxt = '⛽ Carga parcial recomendada';
    titulo = litCargar + ' L a cargar';
    msg = 'Carga necesaria para completar el viaje con margen del ' + (mgn * 100).toFixed(0) + '%.';
  }

  rb.innerHTML =
    '<div class="result ' + cls + '">' +
      '<div class="result-litros">' +
        (litCargar === 0
          ? '— <span>sin carga</span>'
          : litCargar + ' <span>litros a cargar</span>') +
      '</div>' +
      '<div class="result-msg">' + msg + '</div>' +
      '<div class="result-badge ' + badgeCls + '">' + badgeTxt + '</div>' +
      '<div class="result-grid">' +
        '<div class="rg-item"><div class="rg-lbl">Equipo</div><div class="rg-val">' + v.patente + '</div></div>' +
        '<div class="rg-item"><div class="rg-lbl">Destino</div><div class="rg-val">' + d.name + '</div></div>' +
        '<div class="rg-item"><div class="rg-lbl">Distancia total</div><div class="rg-val">' + d.km + ' km</div></div>' +
        '<div class="rg-item"><div class="rg-lbl">Consumo estimado</div><div class="rg-val">' + litViaje + ' L</div></div>' +
        '<div class="rg-item"><div class="rg-lbl">Nivel actual</div><div class="rg-val">' + litActual + ' L (' + pct + '%)</div></div>' +
        '<div class="rg-item"><div class="rg-lbl">Mínimo requerido</div><div class="rg-val">' + litRequerido + ' L</div></div>' +
      '</div>' +
    '</div>';
}

/* ===================== INIT ===================== */
renderFleet();
renderDests();
</script>
</body>
</html>
